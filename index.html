<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .container:hover {
        transform: translateY(-5px);
    }

    h2 {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 25px;
        margin: 0;
        text-align: center;
        font-weight: 600;
        font-size: 1.8rem;
    }

    form {
        padding: 30px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
        font-size: 0.9rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e1e8ed;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
        background-color: #f9fafb;
    }

    input:focus,
    textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        background-color: white;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    small {
        display: block;
        margin-top: 5px;
        font-size: 0.75rem;
        color: #666;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    button:active {
        transform: translateY(0);
    }

    .mensagem {
        margin: 20px 30px 30px;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        font-weight: 500;
        display: none;
        animation: fadeIn 0.5s ease;
    }

    .sucesso {
        background-color: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }

    .erro {
        background-color: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsividade */
    @media (max-width: 600px) {
        .container {
            border-radius: 15px;
        }
        h2 {
            font-size: 1.5rem;
            padding: 20px;
        }
        form {
            padding: 20px;
        }
        button {
            padding: 12px;
        }

    .btn-painel {
        width: 100%;
        padding: 14px;
        background: transparent;
        color: #667eea;
        border: 2px solid #667eea;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
    }

    .btn-painel:hover {
        background: rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
    }

    .btn-painel:active {
        transform: translateY(0);
    }

    }
</style>
    </style>
</head>
<body>
    <div class="container">
        <h2>Formulário de Cadastro</h2>
        <form id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome (apenas letras):</label>
                <input type="text" id="nome" name="nome" required pattern="[A-Za-zÀ-ÖØ-öø-ÿ\s]+" title="Apenas letras e espaços">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem (máx. 250 caracteres):</label>
                <textarea id="mensagem" name="mensagem" maxlength="250" required></textarea>
                <small id="contador">0/250 caracteres</small>
            </div>
            <button type="submit">Enviar</button>
                        <button type="submit">Enviar</button>
            <!-- Novo botão para acessar o painel -->
            <a href="listar.php" style="text-decoration: none;">
                <button type="button" class="btn-painel">📋 Ver Mensagens Cadastradas</button>
            </a>
        </form>
        <div id="resposta" class="mensagem"></div>
    </div>

    <script>
        const mensagemField = document.getElementById('mensagem');
        const contador = document.getElementById('contador');
        
        mensagemField.addEventListener('input', function() {
            const caracteres = this.value.length;
            contador.textContent = `${caracteres}/250 caracteres`;
            if (caracteres > 250) {
                this.value = this.value.substring(0, 250);
                contador.textContent = `250/250 caracteres`;
            }
        });

        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            
            const nome = document.getElementById('nome').value;
            const regexLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;
            if (!regexLetras.test(nome)) {
                alert('O nome deve conter apenas letras e espaços.');
                return;
            }
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('processar.php', {
                    method: 'POST',
                    body: formData
                });
                
                const resultado = await response.json();
                const respostaDiv = document.getElementById('resposta');
                
                if (resultado.status === 'sucesso') {
                    respostaDiv.className = 'mensagem sucesso';
                    respostaDiv.textContent = resultado.mensagem;
                    document.getElementById('cadastroForm').reset();
                    contador.textContent = '0/250 caracteres';
                } else {
                    respostaDiv.className = 'mensagem erro';
                    respostaDiv.textContent = resultado.mensagem;
                }
                
                respostaDiv.style.display = 'block';
                
                setTimeout(() => {
                    respostaDiv.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error('Erro:', error);
                const respostaDiv = document.getElementById('resposta');
                respostaDiv.className = 'mensagem erro';
                respostaDiv.textContent = 'Erro ao conectar com o servidor';
                respostaDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
